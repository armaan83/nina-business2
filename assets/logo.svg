<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="NM Consultant">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#163450"/>
      <stop offset="100%" stop-color="#0a1726"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eccd80"/>
      <stop offset="100%" stop-color="#c2922f"/>
    </linearGradient>
  </defs>

  <!-- EU star ring: 12 dots -->
  <circle cx="60" cy="8" r="2.6" fill="url(#gold)"/>
  <circle cx="86" cy="15" r="2.6" fill="url(#gold)"/>
  <circle cx="105" cy="34" r="2.6" fill="url(#gold)"/>
  <circle cx="112" cy="60" r="2.6" fill="url(#gold)"/>
  <circle cx="105" cy="86" r="2.6" fill="url(#gold)"/>
  <circle cx="86" cy="105" r="2.6" fill="url(#gold)"/>
  <circle cx="60" cy="112" r="2.6" fill="url(#gold)"/>
  <circle cx="34" cy="105" r="2.6" fill="url(#gold)"/>
  <circle cx="15" cy="86" r="2.6" fill="url(#gold)"/>
  <circle cx="8" cy="60" r="2.6" fill="url(#gold)"/>
  <circle cx="15" cy="34" r="2.6" fill="url(#gold)"/>
  <circle cx="34" cy="15" r="2.6" fill="url(#gold)"/>

  <!-- modern rounded shield -->
  <path d="M60 16 L96 30 V57 C96 85 80 99 60 104 C40 99 24 85 24 57 V30 Z"
        fill="url(#shield)" stroke="url(#gold)" stroke-width="2.5"/>

  <!-- centered NM monogram, modern geometric sans -->
  <text x="60" y="60" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="38" font-weight="800"
        fill="url(#gold)" text-anchor="middle" letter-spacing="-2.5">NM</text>

  <!-- Croatia vibe: mountains + coast line as a grounded horizon -->
  <path d="M32 84 L45 70 L56 80 L68 64 L80 78 L88 68"
        fill="none" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
</svg>
